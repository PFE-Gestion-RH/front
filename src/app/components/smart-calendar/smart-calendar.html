<div class="smart-calendar-wrapper">

    <dx-load-indicator [visible]="loading" height="20" width="20"></dx-load-indicator>

    <!-- Message de guidage -->
    <div class="selection-guide" *ngIf="!loading">
        {{ selectionMessage }}
    </div>

    <dx-calendar [(value)]="currentDate" [cellTemplate]="'customCell'" (onValueChanged)="onValueChanged($event)"
        (onOptionChanged)="onOptionChanged($event)">

        <div *dxTemplate="let cell of 'customCell'" [style.background-color]="getBgColor(cell.date)"
            [style.color]="getTextColor(cell.date)" [style.border-radius]="'50%'"
            [style.font-weight]="getWeight(cell.date)" [style.width]="'100%'" [style.height]="'100%'"
            [style.display]="'flex'" [style.align-items]="'center'" [style.justify-content]="'center'">
            {{ cell.text }}
        </div>

    </dx-calendar>

    <!-- Légende -->
    <div class="cal-legend">
        <span class="legend-dot green"></span><span>moins de 30%</span>
        <span class="legend-dot orange"></span><span>30–50%</span>
        <span class="legend-dot red"></span><span>plus de 50%</span>
    </div>

    <!-- Message info jour sélectionné -->
    <div class="recommendation-msg" *ngIf="selectedDayMessage">
        {{ selectedDayMessage }}
    </div>

</div>
