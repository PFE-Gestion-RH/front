<div class="login-page">

  <div class="login-left">
    <div class="illustration-wrapper">
      <img src="assets/barthauer_illustration_v3.svg" alt="All services at a click" class="illustration-img"
        draggable="false" />
    </div>
  </div>
  <div class="login-right">
    <div class="login-form-container">

      <div class="brand-header">
        <h1 class="brand-name">BARTHAUER</h1>
        <div class="brand-line"></div>
        <span class="brand-subtitle">SOFTWARE</span>
      </div>

      <div class="form-group floating-group">
        <div class="input-wrapper" [class.focused]="emailFocused || email">
          <div class="left-bar" [class.visible]="emailFocused"></div>
          <label class="floating-label" [class.active]="emailFocused || email">Email</label>
          <dx-text-box [(value)]="email" [disabled]="isLoading" (onFocusIn)="emailFocused = true"
            (onFocusOut)="emailFocused = false" (onEnterKey)="onLogin()">
          </dx-text-box>
        </div>
      </div>
      <div class="form-group floating-group">
        <div class="input-wrapper password-wrapper" [class.focused]="passwordFocused || password">
          <div class="left-bar" [class.visible]="passwordFocused"></div>
          <label class="floating-label" [class.active]="passwordFocused || password">Password</label>
          <dx-text-box [(value)]="password" [mode]="passwordMode" [disabled]="isLoading"
            (onFocusIn)="passwordFocused = true" (onFocusOut)="passwordFocused = false" (onEnterKey)="onLogin()">
          </dx-text-box>
          <span class="eye-toggle" (mousedown)="$event.preventDefault(); togglePassword()">
            <i [class]="passwordMode === 'password' ? 'dx-icon-eyeclose' : 'dx-icon-eyeopen'"></i>
          </span>
        </div>
      </div>
      <div class="btn-wrapper">
        <dx-button [text]="isLoading ? '' : 'Login'" type="default" stylingMode="contained" [width]="'100%'"
          class="login-btn" [disabled]="isLoading" (onClick)="onLogin()">
        </dx-button>
        <span class="btn-spinner" *ngIf="isLoading">
          <span class="spinner"></span>
        </span>
      </div>
      <div class="forgot-row">
        <a (click)="goToForgot()">Forgot password?</a>
      </div>

      <div class="register-row">
        <span>Don't have an account yet? </span>
        <a (click)="goToRegister()" class="register-link">Create an account</a>
      </div>

    </div>
  </div>
</div>
