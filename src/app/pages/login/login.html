<div class="login-page">

  <div class="login-left"></div>

  <div class="login-right">
    <div class="login-form-container">

      <div class="brand-header">
        <h1 class="brand-name">BARTHAUER</h1>
        <div class="brand-line"></div>
        <span class="brand-subtitle">SOFTWARE</span>
      </div>

      <div class="form-group floating-group">
        <div class="input-wrapper"
             [class.focused]="emailFocused || email">

          <div class="left-bar"
               [class.visible]="emailFocused"></div>

          <label class="floating-label"
                 [class.active]="emailFocused || email">
            Email
          </label>

          <dx-text-box
            [(value)]="email"
            (onFocusIn)="emailFocused = true"
            (onFocusOut)="emailFocused = false">
          </dx-text-box>

        </div>
      </div>

      <div class="form-group floating-group">
        <div class="input-wrapper"
             [class.focused]="passwordFocused || password">

          <div class="left-bar"
               [class.visible]="passwordFocused"></div>

          <label class="floating-label"
                 [class.active]="passwordFocused || password">
            Password
          </label>

        <dx-text-box
  [(value)]="password"
  [mode]="passwordMode"
  (onFocusIn)="passwordFocused = true"
  (onFocusOut)="passwordFocused = false">

  <dxi-button
    name="togglePassword"
    location="after"
    [options]="{
      icon: passwordMode === 'password' ? 'eyeclose' : 'eyeopen',
      stylingMode: 'text',
      type: 'normal',
      onClick: togglePassword.bind(this)
    }">
  </dxi-button>

</dx-text-box>

        </div>
      </div>

 

      <dx-button
        text="Login"
        type="default"
        stylingMode="contained"
        [width]="'100%'"
        class="login-btn"
        (onClick)="onLogin()">
      </dx-button>

      <div class="forgot-row">
        <a (click)="goToForgot()">Forgot password?</a>
      </div>

      <div class="register-row">
        <span>Don't have an account yet? </span>
        <a (click)="goToRegister()" class="register-link">
          Create an account
        </a>
      </div>

    </div>
  </div>

</div>
