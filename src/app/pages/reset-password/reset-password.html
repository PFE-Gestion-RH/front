<div class="reset-password-container">
  <h2>Réinitialisation du mot de passe</h2>
  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div>
      <label>Nouveau mot de passe</label>
      <input type="password" formControlName="newPassword" />
      <div *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.invalid">
        Mot de passe requis (min 6 caractères)
      </div>
    </div>

    <div>
      <label>Confirmer le mot de passe</label>
      <input type="password" formControlName="confirmPassword" />
      <div *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.get('confirmPassword')?.invalid">
        Les mots de passe doivent correspondre
      </div>
    </div>

    <button type="submit" [disabled]="resetForm.invalid">Réinitialiser le mot de passe</button>
  </form>

  <div *ngIf="message" [ngClass]="{'success': isSuccess, 'error': !isSuccess}">
    {{ message }}
  </div>
</div>
