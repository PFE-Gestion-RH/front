<div class="forget-password-page">

  <div class="page-header">
    <div class="header-logo">
      <h1 class="brand-name">BARTHAUER</h1>
      <div class="brand-line"></div>
      <span class="brand-subtitle">SOFTWARE </span>
    </div>
  </div>

  <div class="main-content">

    <div class="forget-password-card">

      <h2 class="card-title">Forgot Password?</h2>
      <p class="card-subtitle">Enter your email to receive a reset link</p>

      <!-- Message success -->
      @if (showEmailSent) {
      <div class="success-state">
        <div class="status-icon success">✓</div>
        <h3 class="success-title">Email Sent!</h3>
        <p class="success-message">
          A password reset link has been sent to <strong>{{ email }}</strong>
        </p>
        <p class="success-hint">Please check your inbox and spam folder</p>

        <dx-button text="Back to Login" type="default" stylingMode="contained" [width]="'100%'" [height]="54"
          class="login-btn" (onClick)="goToLogin()">
        </dx-button>
      </div>
      }

      @if (!showEmailSent) {
      <dx-validation-group #emailValidationGroup>
        <div class="form-group floating-group">
          <div class="input-wrapper" [class.focused]="emailFocused || email">
            <div class="left-bar" [class.visible]="emailFocused"></div>
            <label class="floating-label" [class.active]="emailFocused || email">Email</label>
            <dx-text-box [(value)]="email" mode="email" (onFocusIn)="emailFocused = true"
              (onFocusOut)="emailFocused = false" (onEnterKey)="sendResetLink(emailValidationGroup)">
              <dx-validator>
                <dxi-validation-rule type="required" message="Email is required"></dxi-validation-rule>
                <dxi-validation-rule type="email" message="Invalid email address"></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>
        </div>

        <dx-button text="Send Reset Link" type="default" stylingMode="contained" class="login-btn"
          [disabled]="isLoading" (onClick)="sendResetLink(emailValidationGroup)">
        </dx-button>
      </dx-validation-group>
      }


      @if (!showEmailSent) {
      <div class="back-link">
        <a (click)="goToLogin()">← Back to Login</a>
      </div>
      }

    </div>
  </div>
</div>
