
<div *ngIf="showEmailSent" class="success-message">
  Lien de réinitialisation envoyé à votre email.
</div>

<dx-form *ngIf="!showEmailSent"
         [formData]="forgotPasswordData"
         [showColonAfterLabel]="true"
         [showValidationSummary]="true"
         [labelLocation]="'top'">

  <dxi-item
    dataField="email"
    editorType="dxTextBox"
    [editorOptions]="{ placeholder: 'votre@email.com' }"
    [isRequired]="true"
    [validationRules]="[
      { type: 'required', message: 'Email requis' }, 
      { type: 'email', message: 'Email invalide' }
    ]">
  </dxi-item>

  <dxi-item>
    <dx-button
      text="Envoyer le lien"
      type="success"
      (onClick)="sendResetLink()">
    </dx-button>
  </dxi-item>

</dx-form>

<div *ngIf="message && !showEmailSent" class="error-message">
  {{ message }}
</div>
