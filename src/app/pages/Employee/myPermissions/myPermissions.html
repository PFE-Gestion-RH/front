<div class="permissions-page">
  <div class="permissions-grid" style="position: relative;">

    <dx-load-panel
      [visible]="isLoading"
      [position]="{ of: '.permissions-grid' }"
      [showIndicator]="true"
      [showPane]="true"
      [shading]="true"
      [shadingColor]="'rgba(255,255,255,0.6)'"
      message="Loading...">
    </dx-load-panel>

    <div class="app-page-header">
      <h2 class="page-title">My Permissions</h2>
      <button class="add-btn" (click)="openAdd()">+ New Permission</button>
    </div>

    <!-- TABLE -->
    <div class="table-view">
      <dx-data-grid
        [dataSource]="sharedDataSource"
        [columns]="columns"
        [showBorders]="false"
        [showRowLines]="true"
        [showColumnLines]="false"
        [hoverStateEnabled]="true"
  [remoteOperations]="{ paging: true, filtering: false, sorting: false }">

        <dxo-load-panel [enabled]="false"></dxo-load-panel>
        <dxo-search-panel [visible]="true" placeholder="Search..."></dxo-search-panel>
        <dxo-selection mode="none"></dxo-selection>
        <dxo-editing [allowUpdating]="false" [allowDeleting]="false" [allowAdding]="false"></dxo-editing>
        <dxo-paging [enabled]="true" [pageSize]="pageSize"></dxo-paging>
        <dxo-pager [visible]="true" [showNavigationButtons]="true" [showInfo]="true"
          infoText="{0}-{1} of {2} permissions">
        </dxo-pager>

      </dx-data-grid>
    </div>

    <!-- CARDS -->
    <div class="cards-view" [class.is-loading]="isLoading">
    <dx-card-view
  [dataSource]="cardDataSource"
  keyExpr="id"
  [cardMinWidth]="280"
  cardsPerRow="auto"
  [remoteOperations]="{ paging: true }">


        <dxo-card-view-search-panel [visible]="true" placeholder="Search..."></dxo-card-view-search-panel>
        <dxo-card-view-paging [enabled]="true" [pageSize]="pageSize"></dxo-card-view-paging>
        <dxo-card-view-pager [visible]="true" [showNavigationButtons]="true" [showInfo]="true"
          infoText="{0}-{1} of {2} permissions">
        </dxo-card-view-pager>

        <dxi-card-view-column dataField="reason" [visible]="false" [allowSearch]="true"></dxi-card-view-column>
        <dxi-card-view-column dataField="startDate" [visible]="false" [allowSearch]="true"></dxi-card-view-column>

        <dxi-card-view-column
          caption=""
          [calculateFieldValue]="getCardData"
          fieldValueTemplate="cardBodyTemplate"
          [allowSorting]="false"
          [allowSearch]="false"
          [allowFiltering]="false">
        </dxi-card-view-column>

        <div *dxTemplate="let params of 'cardBodyTemplate'" class="card-body-template">
          <div class="card-top">
            <div class="card-avatar">
              <i class="dx-icon dx-icon-clock"></i>
            </div>
            <div class="card-info">
              <h4 class="card-name">{{ params.field.value?.reason }}</h4>
              <span class="card-role">
                {{ params.field.value?.startDate | date:'dd/MM/yyyy' }} —
                {{ params.field.value?.startTime?.substring(0,5) }} to
                {{ params.field.value?.endTime?.substring(0,5) }}
              </span>
            </div>
          </div>
          <div class="card-divider"></div>
          <div class="card-statuses">
            <span class="badge" [class]="getStatusClass(params.field.value?.status)">
              {{ getStatusLabel(params.field.value?.status) }}
            </span>
          </div>
        </div>

      </dx-card-view>
    </div>

  </div>

<!-- Popup ajout Permission -->
<dx-popup [(visible)]="showPopup" [width]="500" [height]="'auto'"
  title="New Permission" [showCloseButton]="!isSaving">
  <div *dxTemplate="let data of 'content'" class="profile-form">
    <dx-validation-group #validationGroup>
      <div class="form-section">

        <div class="form-field">
          <label>Reason</label>
          <dx-text-box
            [(value)]="newPermission.reason"
            placeholder="Enter reason"
            [disabled]="isSaving">
           
          </dx-text-box>
        </div>

        <div class="form-field">
          <label>Date</label>
          <dx-date-box
            [(value)]="permissionDate"
            type="date"
            displayFormat="dd/MM/yyyy"
            pickerType="calendar"
            [disabled]="isSaving"
            (onValueChanged)="onDateChanged($event)">
            <dx-validator>
              <dxi-validation-rule type="required" message="Date is required"></dxi-validation-rule>
            </dx-validator>
          </dx-date-box>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>Start Time</label>
            <dx-date-box
              [(value)]="permissionStartTime"
              type="time"
              displayFormat="HH:mm"
              pickerType="native"
              [disabled]="isSaving"
              (onValueChanged)="onStartTimeChanged($event)">
              <dx-validator>
                <dxi-validation-rule type="required" message="Start time is required"></dxi-validation-rule>
              </dx-validator>
            </dx-date-box>
          </div>
          <div class="form-field">
            <label>End Time</label>
            <dx-date-box
              [(value)]="permissionEndTime"
              type="time"
              displayFormat="HH:mm"
              pickerType="native"
              [disabled]="isSaving"
              (onValueChanged)="onEndTimeChanged($event)">
              <dx-validator>
                <dxi-validation-rule type="required" message="End time is required"></dxi-validation-rule>
              </dx-validator>
            </dx-date-box>
          </div>
        </div>

      </div>
      <div class="form-actions">
        <dx-button text="Cancel" [disabled]="isSaving" (onClick)="showPopup = false"></dx-button>
        <dx-button [disabled]="isSaving" type="default" (onClick)="save(validationGroup)">
          <div *dxTemplate="let data of 'content'" style="display:flex;align-items:center;gap:8px;">
            <dx-load-indicator [visible]="isSaving" height="16" width="16"></dx-load-indicator>
@if (!isSaving) {
  <span>Save</span>
}          </div>
        </dx-button>
      </div>
    </dx-validation-group>
  </div>
</dx-popup>

</div>
