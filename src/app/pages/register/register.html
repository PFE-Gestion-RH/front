<div class="login-container">
  <mat-card class="login-card">
    <div class="login-header">
      <h1>BARTHAUER</h1>
      <h3 class="subtitle">SOFTWARE TUNISIA</h3>
    </div>

    <h2 class="login-title">Créer un compte</h2>

    <form (ngSubmit)="register()" #registerForm="ngForm" class="login-form">
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Nom complet</mat-label>
        <input matInput required [(ngModel)]="fullName" name="fullName" placeholder="Votre nom complet">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Email</mat-label>
        <input matInput type="email" required [(ngModel)]="email" name="email" placeholder="votre@email.com">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Mot de passe</mat-label>
        <input matInput type="password" required [(ngModel)]="password" name="password" placeholder="••••••••">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Confirmer mot de passe</mat-label>
        <input matInput type="password" required [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••">
      </mat-form-field>

      <div class="form-options">
        <mat-checkbox [(ngModel)]="rememberMe" name="rememberMe">Se souvenir de moi</mat-checkbox>
      </div>

      <button mat-raised-button color="primary" type="submit" [disabled]="registerForm.invalid" class="login-button">
        S'inscrire
      </button>
    </form>

    <div class="register-link">
      <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
    </div>
  </mat-card>
</div>
